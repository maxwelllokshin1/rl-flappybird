name: Build and Deploy to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install pygbag
        run: pip install pygbag

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Convert WAV to OGG for browser compatibility
        run: |
          cd "Source Code/sound"
          for f in *.wav; do
            ffmpeg -i "$f" -c:a libvorbis -q:a 5 "${f%.wav}.ogg" -y
          done
          rm *.wav
          cd ../..

      - name: Update sound references in code
        run: |
          sed -i "s/sfx_wing.wav/sfx_wing.ogg/g" "Source Code/main.py"
          sed -i "s/sfx_hit.wav/sfx_hit.ogg/g" "Source Code/main.py"
          sed -i "s/sfx_point.wav/sfx_point.ogg/g" "Source Code/main.py"

      - name: Build with pygbag
        run: |
          pygbag --build "Source Code"
          mv "Source Code/build/web" .

      - name: Upload Project
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
